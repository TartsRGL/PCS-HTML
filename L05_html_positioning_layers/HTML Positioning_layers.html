<!-- Commit 1 – Define explicit parent-child containers -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="PCShtml Lesson 5 – Positioning Prep in HTML" />
  <title>PCShtml L5 – Positioning Prep</title>
</head>

<body>

  <header>
    <h1>Positioning Prep</h1>
    <p>Everything starts with a container.</p>
  </header>

  <main>
    <article class="positioning-parent">
      <header>
        <h2>The Parent Container</h2>
        <!-- Commit 2 – Add overlay/layering markup -->
        <span class="status-badge" aria-label="Status">Draft</span>
        <p>This element will act as the anchor for everything inside it.</p>
      </header>

      <section class="child-content">
        <p>In CSS, this would be the flow-relative content. It stays in the normal flow.</p>
      </section>

      <!-- Commit 2 – Add overlay/layering markup -->
      <aside class="overlay-note">
        <p>This note will sit on top of the content once positioned.</p>
      </aside>
    </article>
  </main>

  <footer>
    <p>&copy; 2026 PCShtml</p>
  </footer>

</body>
</html>
