<!-- Commit 1 – Define base component container -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="PCShtml Lesson 6 – Components and Reusability in HTML" />
  <title>PCShtml L6 – Components</title>
</head>

<body>

  <header>
    <h1>Thinking in Components</h1>
    <p>Building reusable pieces of UI.</p>
  </header>

  <main>
    <section class="components-container">
      <h2>Products</h2>
      
      <!-- Commit 1 – Define base component container -->
      <article class="ui-component">
        <!-- Commit 2 – Extract reusable card structure -->
        <div class="card">
          
          <!-- Commit 3 – Organize component internal structure -->
          <header class="card-header">
            <h3 class="card-title">Product Item</h3>
          </header>
          
          <div class="card-body">
            <p class="card-description">This paragraph contains a block of text describing the product.</p>
          </div>
          
          <footer class="card-footer">
            <button type="button" class="card-button">Buy Now</button>
          </footer>

        </div>
      </article>

    </section>
  </main>

  <footer>
    <p>&copy; 2026 PCShtml</p>
  </footer>

</body>
</html>
